# ── UDA Step 2 FINAL: Cityscapes → ACDC  [FULL DATA RUN] ────────────────────
# Same hyperparams as v2 (validated). Init from full-data step1 best.pth.
name: step2_cs2acdc_b5_final
step: 2

data:
  gta5_root:       ~/data/gta5
  cityscapes_root: ~/data/cityscapes
  acdc_root:       ~/data/acdc
  output_root:     ~/projects/weather-uda-segformer/outputs

model:
  checkpoint: nvidia/mit-b5
  num_labels: 19

training:
  crop_size:        512
  batch_size:       1
  max_iters:        20000
  lr:               3.0e-5
  weight_decay:     0.01
  mixed_precision:  true
  pseudo_threshold: 0.8
  grad_accum_steps: 2
  ema_decay:        0.9999
  lambda_u:         1.0
  log_interval:     100
  eval_interval:    2000
  save_interval:    5000

acdc_conditions:
  - fog
  - rain
  - snow
  - night

seed: 42
